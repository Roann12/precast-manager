name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"
      rebuild_images:
        description: "Rebuild Docker images"
        required: true
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Create release bundle
        run: |
          tar \
            --exclude='.git' \
            --exclude='docker-compose.yml' \
            -czf /tmp/precast-release.tgz \
            .

      - name: Upload release bundle
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          scp /tmp/precast-release.tgz "${PROD_USER}@${PROD_HOST}:/tmp/precast-release.tgz"

      - name: Deploy on server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          REF: ${{ inputs.ref }}
          REBUILD: ${{ inputs.rebuild_images }}
        run: |
          ssh "${PROD_USER}@${PROD_HOST}" "PROD_APP_DIR='${PROD_APP_DIR}' REF='${REF}' REBUILD='${REBUILD}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${PROD_APP_DIR}"

          # Keep production secrets local on server.
          if [ -f .env ]; then
            cp .env /tmp/precast-env-backup
          fi

          tar -xzf /tmp/precast-release.tgz -C "${PROD_APP_DIR}"

          if [ -f /tmp/precast-env-backup ]; then
            mv /tmp/precast-env-backup .env
          fi

          if [ "${REBUILD}" = "true" ]; then
            docker compose up -d --build
          else
            docker compose up -d
          fi

          docker compose ps
          EOF
